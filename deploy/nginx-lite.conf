# Route /lite* naar de publieke lite-service (app/lite_server.py, poort 5152).
# Bedoeld als HestiaCP custom-config-snippet -- zie DEPLOY.md stap 6:
# kopieer dit bestand naar zowel
#   /home/hestiaadmin/conf/web/<domein>/nginx.conf_lite      (HTTP-serverblok)
#   /home/hestiaadmin/conf/web/<domein>/nginx.ssl.conf_lite  (SSL-serverblok)
# Beide zijn nodig: het HTTP-blok wordt weliswaar geforceerd doorgestuurd naar
# https (zie nginx.forcessl.conf*), maar zonder deze regel daar ook zou een
# toekomstige wijziging van die forced-redirect /lite alsnog laten wegvallen.
location /lite {
	proxy_pass http://127.0.0.1:5152;
	proxy_set_header Host              $host;
	proxy_set_header X-Real-IP         $remote_addr;
	proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_read_timeout 60s;
}
